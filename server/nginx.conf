# Nginx config para PartnerHub Dashboard
# Copie para: /etc/nginx/sites-available/partnerhub
# Ative com: sudo ln -s /etc/nginx/sites-available/partnerhub /etc/nginx/sites-enabled/
# Recarregue: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name dash.amzcursos.com;

    # Redirecionar HTTP → HTTPS (descomente após configurar SSL)
    # return 301 https://$host$request_uri;

    root /var/www/partnerhub/dist;
    index index.html;

    # Frontend (React SPA) — todas as rotas vão para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — proxy para Express na porta 3001
    location /api/ {
        proxy_pass         http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Gzip para performance
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}

